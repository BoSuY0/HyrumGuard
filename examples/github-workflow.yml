name: hyrumguard
on:
  pull_request:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: BoSuY0/HyrumGuard@v1.0.0
        with:
          config: .hyrumguard.yml

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hyrumguard.sarif
